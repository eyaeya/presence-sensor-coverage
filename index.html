<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>人在传感器安装定位可视化</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;font-family:-apple-system,"PingFang SC",system-ui,sans-serif;background:#0f1115;color:#e6e8eb;}
  #app{display:grid;grid-template-columns:1fr 240px;grid-template-rows:1fr 190px;height:100vh;}
  #viz{position:relative;border-right:1px solid #222831;border-bottom:1px solid #222831;overflow:hidden;}
  #viz svg{width:100%;height:100%;display:block;}
  #viz .tt{position:absolute;top:10px;left:14px;font-size:11px;color:#6b7280;pointer-events:none;}
  #legend{position:absolute;left:14px;bottom:10px;display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:#aab;pointer-events:none;}
  #legend i{display:inline-block;width:12px;height:10px;border-radius:2px;margin-right:5px;vertical-align:-1px;}
  #legend .d{width:18px;height:0;border-top:2px dashed;}
  #info{border-bottom:1px solid #222831;padding:15px;font-size:12px;overflow:auto;background:#101319;}
  #info h3{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#6b7280;margin:14px 0 6px;}
  #info h3:first-child{margin-top:0;}
  #info .row{display:flex;justify-content:space-between;padding:3px 0;color:#c4ccd6;}
  #info .row span:last-child{color:#fff;font-variant-numeric:tabular-nums;}
  .mini-room{height:72px;border:1px solid #2c333d;background:#0c0f15;position:relative;margin-bottom:12px;}
  .mini-room:before,.mini-room:after{content:"";position:absolute;background:#253040;}
  .mini-room:before{left:50%;top:0;bottom:0;width:1px;}
  .mini-room:after{left:0;right:0;top:50%;height:1px;}
  .mini-room i{position:absolute;width:11px;height:11px;border-radius:50%;background:#fff;box-shadow:0 0 0 5px rgba(255,255,255,.12);transform:translate(-50%,50%);z-index:1;}
  .mini-room.side i{background:#5fb0ff;}
  .mini-room.corner i{background:#f0913a;}
  .chips{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:8px 0 2px;}
  .chips .chip{padding:5px 4px;}
  .chip{display:flex;justify-content:space-between;align-items:center;border:1px solid #28313c;background:#0c0f15;padding:6px 7px;color:#c4ccd6;font-variant-numeric:tabular-nums;}
  .chip b{font-size:10px;color:#7b818b;font-weight:600;}
  .chip span{color:#fff;}
  .hover-compass{display:grid;grid-template-columns:auto 1fr auto;grid-template-rows:auto 1fr auto;gap:6px 8px;padding:6px 4px;font-variant-numeric:tabular-nums;font-size:12px;color:#c4ccd6;}
  .hover-compass .hc-cell{display:flex;align-items:center;justify-content:center;color:#fff;}
  .hover-compass .hc-mini{position:relative;background:#0c0f15;border:1px solid #2c333d;min-width:90px;min-height:54px;}
  .hover-compass .hc-mini:before,.hover-compass .hc-mini:after{content:"";position:absolute;background:#253040;}
  .hover-compass .hc-mini:before{left:50%;top:0;bottom:0;width:1px;}
  .hover-compass .hc-mini:after{left:0;right:0;top:50%;height:1px;}
  .hover-compass .hc-cursor{position:absolute;width:9px;height:9px;border-radius:50%;background:#facc15;box-shadow:0 0 0 3px rgba(250,204,21,.22);transform:translate(-50%,50%);}
  .hover-compass .hc-label{font-size:10px;color:#7b818b;margin-right:4px;}
  .hover-compass .hc-top{grid-column:2;grid-row:1;flex-direction:column;}
  .hover-compass .hc-bottom{grid-column:2;grid-row:3;flex-direction:column;}
  .hover-compass .hc-left{grid-column:1;grid-row:2;flex-direction:column;}
  .hover-compass .hc-right{grid-column:3;grid-row:2;flex-direction:column;}
  .hover-compass .hc-center{grid-column:2;grid-row:2;}
  .coverage{display:grid;grid-template-columns:1fr 1fr;gap:5px 10px;margin:6px 0 2px;font-size:12px;color:#c4ccd6;}
  .coverage .cv-item{display:flex;align-items:center;gap:6px;}
  .coverage .cv-dot{width:10px;height:10px;border-radius:50%;display:inline-block;border:1px solid;}
  .coverage .cv-dot.off{background:transparent;}
  .coverage .cv-label{font-size:11px;color:#9aa3af;}
  .coverage .cv-h{margin-left:auto;font-variant-numeric:tabular-nums;color:#fff;font-size:11px;}
  #tools{grid-column:1/-1;background:#101319;padding:12px 16px;display:flex;gap:0;align-items:stretch;overflow:auto;}
  .tool-group{display:flex;flex-direction:column;gap:8px;padding:0 18px;border-right:1px solid #27303b;min-height:100%;}
  .tool-group:first-child{padding-left:0;}
  .tool-group:last-child{border-right:0;}
  .tool-group-title{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;}
  .tool-group-body{display:flex;flex-wrap:wrap;gap:10px 14px;align-items:flex-start;}
  .ctl{display:flex;flex-direction:column;gap:3px;min-width:128px;}
  .ctl label{font-size:10px;color:#7b818b;text-transform:uppercase;letter-spacing:.04em;}
  .ctl .rowi{display:flex;align-items:center;gap:7px;}
  .ctl input[type=number]{width:64px;background:#0c0e12;border:1px solid #2c333d;color:#e6e8eb;border-radius:5px;padding:3px 5px;font-size:12px;}
  .ctl input[type=range]{flex:1;min-width:80px;}
  .ctl.disabled{opacity:.35;pointer-events:none;}
  .seg{display:flex;border:1px solid #2c333d;border-radius:7px;overflow:hidden;}
  .seg button{padding:6px 12px;font-size:12px;color:#9aa3af;background:none;border:none;cursor:pointer;}
  .seg button.on{background:#274168;color:#fff;}
  .preset-container{display:flex;flex-direction:column;gap:6px;min-width:200px;}
  .preset-row1{display:flex;gap:6px;align-items:center;}
  .preset-select{flex:1;background:#0c0e12;border:1px solid #2c333d;color:#e6e8eb;border-radius:5px;padding:4px 6px;font-size:12px;}
  .preset-apply{padding:4px 12px;font-size:12px;color:#fff;background:#274168;border:1px solid #3a5a89;border-radius:5px;cursor:pointer;}
  .preset-apply:hover{background:#2f4d7c;}
  .preset-current{font-size:11px;color:#9aa3af;font-variant-numeric:tabular-nums;}
  .preset-current span{color:#e6e8eb;}
  @media (max-width: 860px){
    #app{grid-template-columns:1fr;grid-template-rows:minmax(320px,1fr) auto 210px;}
    #viz{border-right:0;}
    #info{max-height:220px;border-bottom:1px solid #222831;}
    #tools{padding:10px 12px;}
    .tool-group{padding:0 12px;}
  }
  #test-output{padding:20px;font-family:ui-monospace,monospace;font-size:13px;white-space:pre-wrap;line-height:1.5;}
  .pass{color:#5fe0a4;} .fail{color:#ff6b6b;}
</style>
</head>
<body>
<div id="app">
  <div id="viz"><span class="tt">可视化区 · 顶视</span><svg id="svg"></svg><div id="legend"></div></div>
  <div id="info"></div>
  <div id="tools"></div>
</div>
<script src="src/geo.js"></script>
<script src="src/presets.js"></script>
<script src="src/state.js"></script>
<script src="src/render.js"></script>
<script src="src/info.js"></script>
<script src="src/interact.js"></script>
<script src="src/tests.js"></script>
<script src="src/app.js"></script>
</body>
</html>
