<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>坐标系与几何引擎</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,"PingFang SC",system-ui,sans-serif;background:#0f1115;color:#e6e8eb;padding:32px;line-height:1.65;}
  .wrap{max-width:1100px;margin:0 auto;}
  h1{font-size:21px;font-weight:600;margin-bottom:6px;}
  .sub{color:#8b919a;font-size:14px;margin-bottom:24px;}
  .card{background:#171a21;border:1px solid #262b35;border-radius:12px;padding:20px;margin-bottom:20px;}
  h2{font-size:15px;font-weight:600;color:#cbd1da;margin-bottom:12px;}
  svg{width:100%;height:auto;display:block;background:#0c0e12;border-radius:8px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font-size:12px;color:#aab;}
  .legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:6px;vertical-align:-1px;}
  code{background:#0c0e12;padding:1px 6px;border-radius:4px;color:#9fd2ff;font-size:12px;}
  text{font-family:-apple-system,"PingFang SC",sans-serif;}
</style>
</head>
<body>
<div class="wrap">
  <h1>核心设计 · 坐标系与几何引擎</h1>
  <div class="sub">这是工具最关键的部分，看图理解后请在终端确认。</div>

  <div class="card">
    <h2>① 坐标系约定</h2>
    <div class="grid2">
      <div>
        <svg viewBox="0 0 380 280">
          <rect x="50" y="40" width="280" height="200" fill="#12161d" stroke="#454b57" stroke-width="2"/>
          <text x="170" y="30" fill="#9aa3af" font-size="11">顶视图</text>
          <text x="175" y="58" fill="#7be0a4" font-size="11">上墙 y=D</text>
          <text x="172" y="232" fill="#7be0a4" font-size="11">下墙 y=0</text>
          <text x="14" y="145" fill="#7be0a4" font-size="11" transform="rotate(-90 22 145)">左墙 x=0</text>
          <text x="338" y="145" fill="#7be0a4" font-size="11" transform="rotate(90 332 145)">右墙 x=W</text>
          <line x1="50" y1="240" x2="120" y2="240" stroke="#f5a623" stroke-width="2"/>
          <polygon points="120,240 113,236 113,244" fill="#f5a623"/>
          <text x="86" y="258" fill="#f5a623" font-size="11">x →</text>
          <line x1="50" y1="240" x2="50" y2="170" stroke="#f5a623" stroke-width="2"/>
          <polygon points="50,170 46,177 54,177" fill="#f5a623"/>
          <text x="22" y="200" fill="#f5a623" font-size="11">y ↑</text>
          <circle cx="190" cy="140" r="4" fill="#fff"/>
          <text x="198" y="138" fill="#cbd1da" font-size="10">传感器(sx,sy,sz)</text>
        </svg>
      </div>
      <div style="font-size:13px;color:#aeb6c0;">
        <p>顶视图：<code>x∈[0,W]</code> 向右，<code>y∈[0,D]</code> 向上。</p>
        <p style="margin-top:6px;">墙映射：左 <code>x=0</code> / 右 <code>x=W</code> / 下 <code>y=0</code> / 上 <code>y=D</code>。</p>
        <p style="margin-top:6px;">第三维 <code>z</code> = 离地高度，<code>z∈[0, 安装高度]</code>。传感器 3D 位置 <code>S=(sx,sy,sz)</code>。</p>
        <p style="margin-top:6px;">默认 W=4000，D=3000（可改）。</p>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>② 波束模型：椭圆锥 + 中轴截断</h2>
    <svg viewBox="0 0 900 250">
      <text x="40" y="20" fill="#9aa3af" font-size="11">侧视（侧装为例）</text>
      <line x1="40" y1="210" x2="500" y2="210" stroke="#3a4150" stroke-width="2"/>
      <text x="44" y="226" fill="#6b7280" font-size="10">地面 z=0</text>
      <line x1="60" y1="40" x2="60" y2="210" stroke="#3a4150" stroke-width="2"/>
      <rect x="50" y="120" width="18" height="12" rx="2" fill="#4f8cff"/>
      <text x="72" y="130" fill="#9bb8ff" font-size="10">S</text>
      <line x1="59" y1="126" x2="430" y2="196" stroke="#4f8cff" stroke-width="1.5" stroke-dasharray="5 4"/>
      <text x="250" y="158" fill="#9bb8ff" font-size="10" transform="rotate(11 250 158)">中轴 d (下倾θ + 水平ψ)</text>
      <path d="M68 126 L430 150 L430 210 L300 210 Z" fill="#4f8cff" fill-opacity="0.14" stroke="#4f8cff" stroke-opacity="0.45"/>
      <path d="M150 121 A 70 70 0 0 1 152 165" fill="none" stroke="#7be0a4" stroke-width="1.5"/>
      <text x="158" y="150" fill="#7be0a4" font-size="11">垂直FOV (αV=VFOV/2)</text>
      <path d="M59 126 A 300 300 0 0 1 250 360" fill="none" stroke="#e0707a" stroke-width="1.4" stroke-dasharray="4 4" opacity="0.6"/>
      <text x="300" y="135" fill="#e0707a" font-size="10">沿中轴 ≤ 最大距离 R 处截断</text>

      <g transform="translate(560,0)">
        <text x="0" y="20" fill="#9aa3af" font-size="11">某高度 z=h 的截面 → 地面足迹（采样法）</text>
        <line x1="20" y1="210" x2="300" y2="210" stroke="#3a4150" stroke-width="2"/>
        <ellipse cx="170" cy="150" rx="95" ry="48" fill="#9b8cff" fill-opacity="0.2" stroke="#9b8cff" stroke-opacity="0.6"/>
        <g fill="#c9bcff">
          <circle cx="265" cy="150" r="2.5"/><circle cx="245" cy="120" r="2.5"/><circle cx="170" cy="102" r="2.5"/>
          <circle cx="95" cy="120" r="2.5"/><circle cx="75" cy="150" r="2.5"/><circle cx="95" cy="180" r="2.5"/>
          <circle cx="170" cy="198" r="2.5"/><circle cx="245" cy="180" r="2.5"/>
        </g>
        <text x="120" y="240" fill="#8b919a" font-size="10">沿锥面 β 采样 → 与 z=h 求交 → 多边形</text>
      </g>
    </svg>
    <div class="legend">
      <span><i style="background:#7be0a4"></i>FOV 半角 αH=HFOV/2, αV=VFOV/2</span>
      <span><i style="background:#4f8cff"></i>中轴 d（各安装方式不同）</span>
      <span><i style="background:#e0707a"></i>最大距离沿中轴截断</span>
    </div>
  </div>

  <div class="card">
    <h2>③ 三种安装的中轴 d 怎么定</h2>
    <svg viewBox="0 0 900 200">
      <g transform="translate(40,0)">
        <text x="60" y="20" fill="#9aa3af" font-size="11">吸顶</text>
        <rect x="20" y="35" width="200" height="120" fill="none" stroke="#454b57" stroke-width="1.5"/>
        <circle cx="120" cy="95" r="4" fill="#4f8cff"/>
        <line x1="120" y1="95" x2="120" y2="55" stroke="#7be0a4" stroke-width="2"/>
        <polygon points="120,55 116,63 124,63" fill="#7be0a4"/>
        <text x="128" y="60" fill="#7be0a4" font-size="10">水平角φ 0-360°</text>
        <text x="30" y="175" fill="#8b919a" font-size="10">d 朝正下，φ 转椭圆朝向</text>
      </g>
      <g transform="translate(330,0)">
        <text x="60" y="20" fill="#9aa3af" font-size="11">侧装</text>
        <rect x="20" y="35" width="200" height="120" fill="none" stroke="#454b57" stroke-width="1.5"/>
        <circle cx="20" cy="95" r="4" fill="#4f8cff"/>
        <line x1="20" y1="95" x2="90" y2="95" stroke="#9aa3af" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="40" y="88" fill="#9aa3af" font-size="9">法线=0°</text>
        <line x1="20" y1="95" x2="95" y2="70" stroke="#7be0a4" stroke-width="2"/>
        <polygon points="95,70 86,71 90,78" fill="#7be0a4"/>
        <text x="60" y="60" fill="#7be0a4" font-size="10">±ψ 偏斜</text>
        <text x="30" y="175" fill="#8b919a" font-size="10">墙内法线±ψ，再下倾θ</text>
      </g>
      <g transform="translate(620,0)">
        <text x="60" y="20" fill="#9aa3af" font-size="11">墙角</text>
        <rect x="20" y="35" width="200" height="120" fill="none" stroke="#454b57" stroke-width="1.5"/>
        <circle cx="20" cy="155" r="4" fill="#4f8cff"/>
        <line x1="20" y1="155" x2="95" y2="80" stroke="#7be0a4" stroke-width="2"/>
        <polygon points="95,80 86,83 92,89" fill="#7be0a4"/>
        <text x="62" y="120" fill="#7be0a4" font-size="10">45°固定</text>
        <text x="30" y="175" fill="#8b919a" font-size="10">夹角平分线45°，再下倾θ</text>
      </g>
    </svg>
  </div>
</div>
</body>
</html>
